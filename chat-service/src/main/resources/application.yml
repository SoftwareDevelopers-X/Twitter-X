server:
  port: 8086

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:postgresql://localhost:5432/chat-service
    username: postgres
    password: Password@2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

services:
  auth-service:
    name: auth-service
  social-service:
    name: social-service

gateway:
  user-id-header: X-User-Id
  user-id-header-required: true

logging:
  level:
    com.twitterx.chatservice: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always